<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | EduPath</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e3f0ff, #b3d8ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .login-container {
      background: #fff;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(51, 153, 255, 0.2);
      max-width: 400px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #2196f3;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #1565c0;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #b3d8ff;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #1565c0;
    }

    .message {
      text-align: center;
      margin-top: 16px;
      font-weight: 500;
      color: #d32f2f;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #2196f3;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password" />

      <button type="submit">Login</button>
    </form>
    <div class="message" id="loginMessage"></div>
    <a class="link" href="register.html" id="registerLink">Don't have an account? Register</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const message = document.getElementById('loginMessage');

      const storedUser = localStorage.getItem('user_' + username);
      if (!storedUser) {
        message.textContent = 'Username not found.';
        message.style.color = '#d32f2f';
        return;
      }

      const userObj = JSON.parse(storedUser);
      if (userObj.password !== password) {
        message.textContent = 'Incorrect password.';
        message.style.color = '#d32f2f';
        return;
      }

      message.textContent = 'Login successful! Redirecting...';
      message.style.color = '#388e3c';
      sessionStorage.setItem('loggedInUser', username);

      setTimeout(() => {
        window.location.href = 'main.html';
      }, 1200);
    });

    document.getElementById('registerLink').addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = 'register.html';
    });
  </script>
</body>
</html>
