<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logout | EduPath</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e3f0ff, #b3d8ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .logout-container {
      background: #fff;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(51, 153, 255, 0.2);
      max-width: 400px;
      width: 100%;
      text-align: center;
    }

    h2 {
      color: #2196f3;
      margin-bottom: 16px;
    }

    p {
      font-size: 1rem;
      color: #333;
      margin-bottom: 24px;
    }

    button {
      padding: 12px 24px;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="logout-container">
    <h2>Logged Out</h2>
    <p>You have been successfully logged out.</p>
    <button onclick="goToLogin()">Back to Login</button>
  </div>

  <script>
    // Clear session data
    sessionStorage.removeItem('loggedInUser');

    function goToLogin() {
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
