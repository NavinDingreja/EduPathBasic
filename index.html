<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduPath - Start Here</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background: linear-gradient(135deg, #e3f0ff 0%, #b3d8ff 100%);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 600px;
            margin: 80px auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 8px 32px 0 rgba(51,153,255,0.18);
            padding: 40px 32px;
        }
        h1 {
            text-align: center;
            color: #2196f3;
            margin-bottom: 24px;
        }
        .feature-list {
            margin-bottom: 32px;
        }
        .feature-list li {
            font-size: 1.1rem;
            color: #1565c0;
            margin-bottom: 10px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #2196f3;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1.15rem;
            cursor: pointer;
            margin-top: 18px;
            transition: background 0.2s;
        }
        .btn:hover {
            background: #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to EduPath</h1>
        <ul class="feature-list">
            <li>Stream and career guidance</li>
            <li>Quiz to find your best fit</li>
            <li>Great People inspiration</li>
            <li>Chatbot for instant help</li>
            <li>About our mission</li>
            <li>Secure registration and login</li>
        </ul>
        <button class="btn" onclick="location.href='register.html'">Get Started</button>
        <button class="btn" onclick="location.href='login.html'">Login</button>
    </div>
</body>
</html>
