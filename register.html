<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | EduPath</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e3f0ff, #b3d8ff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .register-container {
      background: #fff;
      padding: 32px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(51, 153, 255, 0.2);
      max-width: 400px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #2196f3;
      margin-bottom: 24px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #1565c0;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 18px;
      border: 1px solid #b3d8ff;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #2196f3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #1565c0;
    }

    .message {
      text-align: center;
      margin-top: 16px;
      font-weight: 500;
      color: #d32f2f;
    }

    .link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #2196f3;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h2>Create Account</h2>
    <form id="registerForm" autocomplete="off">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" />

      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email" />

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="new-password" />

      <button type="submit">Register</button>
    </form>
    <div class="message" id="registerMessage"></div>
    <a class="link" href="login.html">Already have an account? Login</a>
  </div>

  <script>
    const form = document.getElementById('registerForm');
    const message = document.getElementById('registerMessage');

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!username || !email || !password) {
        message.textContent = 'Please fill all fields.';
        message.style.color = '#d32f2f';
        return;
      }

      if (localStorage.getItem('user_' + username)) {
        message.textContent = 'Username already exists.';
        message.style.color = '#d32f2f';
        return;
      }

      localStorage.setItem('user_' + username, JSON.stringify({ email, password }));
      message.textContent = 'Registration successful! You can now login.';
      message.style.color = '#388e3c';
      form.reset();
    });
  </script>
</body>
</html>
